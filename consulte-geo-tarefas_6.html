async function sLoad(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } }
async function sSave(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

const DEFAULT_SLA = { baixa: 30, media: 10, importante: 5, urgente: 2 };

function calcDeadline(created, priority, sla) {
  if (!created) return "";
  const d = new Date(created + "T00:00:00");
  d.setDate(d.getDate() + (sla[priority] || 10));
  return d.toISOString().slice(0, 10);
}

function getSlaInfo(task, sla) {
  if (task.column === "concluido") return { status: "done", label: "Concluída", color: "#00B894", days: 0 };
  const dl = task.deadline || calcDeadline(task.created, task.priority, sla);
  if (!dl) return { status: "none", label: "", color: "#6B7280", days: 0 };
  const now = new Date(); now.setHours(0,0,0,0);
  const end = new Date(dl + "T00:00:00");
  const diff = Math.ceil((end - now) / 86400000);
  if (diff < 0) return { status: "late", label: `Atrasada ${Math.abs(diff)}d`, color: "#FF4757", days: diff };
  if (diff === 0) return { status: "today", label: "Vence hoje", color: "#FFA502", days: 0 };
  if (diff <= 2) return { status: "soon", label: `Vence em ${diff}d`, color: "#FFA502", days: diff };
  return { status: "ok", label: `${diff}d restantes`, color: "#00B894", days: diff };
}

function SlaTag({ task, sla, small }) {
  const info = getSlaInfo(task, sla);
  if (info.status === "none") return null;
  const sz = small ? 9 : 10;
  const ico = info.status === "late" ? "🔴" : info.status === "today" || info.status === "soon" ? "🟡" : info.status === "done" ? "✅" : "🟢";
  return <span title={info.label} style={{ fontSize: sz, color: info.color, fontWeight: 700, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 2 }}>{ico} {!small && info.label}</span>;
}

    if(flt.priority && x.priority!==flt.priority) return false;
    if(flt.assignee && x.assignee!==flt.assignee) return false;
    if(flt.search && !x.title.toLowerCase().includes(flt.search.toLowerCase())) return false;
    if(flt.sla) {

      if(flt.sla==="soon" && si.status!=="today" && si.status!=="soon") return false;
      if(flt.sla==="ok" && si.status!=="ok") return false;
    }
    return true;
  });

  const lateCount = tasks.filter(x => getSlaInfo(x, sla).status === "late").length;

  const nT = () => { const td = today(); setMdl({ title:"",column:"pendente",client:"geral",priority:"media",assignee:"fabio",requester:"",description:"",created:td,deadline:calcDeadline(td,"media",sla),attachments:[] }); };

      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      <div style={{ padding:"12px 16px",borderBottom:"1px solid "+t.brd,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap" }}>
        <img src={theme==="dark"?LOGO_DARK:LOGO_LIGHT} alt="Consulte GEO" style={{ height:32 }}/>
        <div style={{ fontSize:10,color:t.mut,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",borderLeft:"1px solid "+t.brd,paddingLeft:12 }}>Gestão de Tarefas</div>
        {lateCount > 0 && <span style={{ background:"#FF475722",color:"#FF4757",fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:20,cursor:"pointer" }} onClick={()=>setFlt(p=>({...p,sla:"late"}))}>🔴 {lateCount} atrasada{lateCount>1?"s":""}</span>}
        <div style={{ marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap" }}>
          <button onClick={()=>setShowSla(!showSla)} style={{...bS,padding:"6px 12px",background:t.colBg,color:t.mut,fontSize:11,fontWeight:700,border:"1px solid "+t.brd}} title="Configurar SLA">⏱ SLA</button>
          <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{...bS,padding:"6px 12px",background:t.colBg,color:t.mut,fontSize:16}} title="Alternar tema">{theme==="dark"?"☀":"🌙"}</button>
          {["kanban","table"].map(v=><button key={v} onClick={()=>setView(v)} style={{...bS,padding:"6px 14px",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",background:view===v?"#0984E3":t.colBg,color:view===v?"#fff":t.mut}}>{v==="kanban"?"⊞ Quadro":"☰ Grade"}</button>)}
          <button onClick={nT} style={{...bS,padding:"8px 16px",background:"#0984E3",color:"#fff",fontWeight:700,fontSize:12}}>+ Nova Tarefa</button>
        </div>
      </div>
      {showSla && (
        <div style={{ padding:"12px 16px",borderBottom:"1px solid "+t.brd,background:t.colBg }}>
          <div style={{ display:"flex",gap:16,alignItems:"center",flexWrap:"wrap" }}>
            <span style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em" }}>SLA (dias):</span>
            {PRIORITIES.map(p=>(
              <div key={p.id} style={{ display:"flex",alignItems:"center",gap:6 }}>
                <span style={{ fontSize:12,color:p.color,fontWeight:600 }}>{p.icon} {p.name}</span>
                <input type="number" min={1} value={sla[p.id]||""} onChange={e=>setSla(s=>({...s,[p.id]:parseInt(e.target.value)||0}))} style={iSla}/>
                <span style={{ fontSize:10,color:t.mut }}>dias</span>
              </div>
            ))}
            <button onClick={()=>setShowSla(false)} style={{...bS,padding:"4px 12px",background:t.card,color:t.mut,fontSize:11}}>Fechar</button>
          </div>
        </div>
      )}
      <div style={{ padding:"10px 16px" }}><Flt filters={flt} setF={setFlt} cls={cls} mbs={mbs} t={t} tasks={tasks} sla={sla}/></div>
      {view==="kanban" ? (
        <div style={{ padding:"0 16px 60px",display:"flex",gap:10,overflowX:"auto" }}>
          {COLUMNS.filter(col=>activeCols.includes(col.id)).map(col=><Col key={col.id} col={col} tasks={filtered.filter(x=>x.column===col.id)} onEdit={setMdl} onDrop={hDrop} cls={cls} mbs={mbs} t={t} sla={sla}/>)}
        </div>
      ) : (
        <div style={{ padding:"0 16px 60px",overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
            <thead><tr style={{ borderBottom:"2px solid "+t.brd }}>{["Tarefa","Cliente","Status","Prioridade","Prazo","SLA","Responsável"].map(h=><th key={h} style={{ padding:"10px 12px",textAlign:"left",fontWeight:800,fontSize:11,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em" }}>{h}</th>)}</tr></thead>
            <tbody>{filtered.map(tk=>{const col=COLUMNS.find(c=>c.id===tk.column); const dl=tk.deadline||calcDeadline(tk.created,tk.priority,sla); return(
              <tr key={tk.id} onClick={()=>setMdl(tk)} style={{ borderBottom:"1px solid "+t.brd,cursor:"pointer" }} onMouseEnter={e=>e.currentTarget.style.background=t.colBg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <td style={{ padding:"10px 12px",fontWeight:600 }}><div style={{display:"flex",alignItems:"center",gap:6}}>{tk.title}{tk.attachments?.length>0 && <span style={{fontSize:11,color:t.mut}} title={tk.attachments.length+" anexo(s)"}>📎</span>}</div></td>
                <td style={{ padding:"10px 12px" }}><Bg c={tk.client} cls={cls}/></td>
                <td style={{ padding:"10px 12px" }}><span style={{ color:col?.accent,fontSize:12,fontWeight:600 }}>{col?.icon} {col?.name}</span></td>
                <td style={{ padding:"10px 12px" }}><Pd pid={tk.priority}/> {PRIORITIES.find(p=>p.id===tk.priority)?.name}</td>
                <td style={{ padding:"10px 12px",fontFamily:"monospace",fontSize:11,color:t.mut }}>{dl}</td>
                <td style={{ padding:"10px 12px" }}><SlaTag task={tk} sla={sla}/></td>
                <td style={{ padding:"10px 12px" }}><Av m={tk.assignee} mbs={mbs} sz={22}/></td>
              </tr>);})}</tbody>
          </table>
        </div>
      )}
      <div style={{ position:"fixed",bottom:0,left:0,right:0,background:t.card,borderTop:"1px solid "+t.brd,padding:"8px 16px",display:"flex",gap:16,fontSize:11,color:t.mut,fontWeight:600,flexWrap:"wrap",zIndex:10 }}>
        {COLUMNS.map(col=><span key={col.id} style={{ color:col.accent }}>{col.icon} {col.name}: {tasks.filter(x=>x.column===col.id).length}</span>)}
        <span style={{ marginLeft:"auto" }}>Total: {tasks.length}</span>
      </div>
      {mdl && <Mdl task={mdl} onSave={hSave} onDel={hDel} onClose={()=>setMdl(null)} cls={cls} mbs={mbs} t={t} onNC={c=>setCls(p=>[...p,c])} sla={sla}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
