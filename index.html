async function sLoad(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } }
async function sSave(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

const DEFAULT_SLA = { baixa: 30, media: 10, importante: 5, urgente: 2 };

function calcDeadline(created, priority, sla) {
  if (!created) return "";
  const d = new Date(created + "T00:00:00");
  d.setDate(d.getDate() + (sla[priority] || 10));
  return d.toISOString().slice(0, 10);
}

function getSlaInfo(task, sla) {
  if (task.column === "concluido") return { status: "done", label: "Concluída", color: "#00B894", days: 0 };
  const dl = task.deadline || calcDeadline(task.created, task.priority, sla);
  if (!dl) return { status: "none", label: "", color: "#6B7280", days: 0 };
  const now = new Date(); now.setHours(0,0,0,0);
  const end = new Date(dl + "T00:00:00");
  const diff = Math.ceil((end - now) / 86400000);
  if (diff < 0) return { status: "late", label: `Atrasada ${Math.abs(diff)}d`, color: "#FF4757", days: diff };
  if (diff === 0) return { status: "today", label: "Vence hoje", color: "#FFA502", days: 0 };
  if (diff <= 2) return { status: "soon", label: `Vence em ${diff}d`, color: "#FFA502", days: diff };
  return { status: "ok", label: `${diff}d restantes`, color: "#00B894", days: diff };
}

function SlaTag({ task, sla, small }) {
  const info = getSlaInfo(task, sla);
  if (info.status === "none") return null;
  const sz = small ? 9 : 10;
  const ico = info.status === "late" ? "🔴" : info.status === "today" || info.status === "soon" ? "🟡" : info.status === "done" ? "✅" : "🟢";
  return <span title={info.label} style={{ fontSize: sz, color: info.color, fontWeight: 700, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 2 }}>{ico} {!small && info.label}</span>;
}

function Av({ m, mbs, sz = 28 }) {
  const x = mbs.find(a => a.id === m); if (!x) return null;

}
function Bg({ c, cls }) {
  const x = cls.find(a => a.id === c); if (!x) return null;
  return <span style={{ background:x.color+"22",color:x.color,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,letterSpacing:"0.04em",textTransform:"uppercase",border:"1px solid "+x.color+"33",whiteSpace:"nowrap" }}>{x.name}</span>;

function Pd({ pid }) {
  const p = PRIORITIES.find(x => x.id === pid); if (!p) return null;
  return <span title={p.name} style={{ fontSize:13,color:p.color,filter:"saturate(1.5)" }}>{p.icon}</span>;
}

function Card({ task, onEdit, cls, mbs, t, sla }) {
  const p = PRIORITIES.find(x => x.id === task.priority);
  const si = getSlaInfo(task, sla);
  const borderColor = si.status === "late" ? "#FF4757" : (p?.color || "#ddd");
  return (
    <div draggable onDragStart={e => e.dataTransfer.setData("tid", task.id)} onClick={() => onEdit(task)}
      style={{ background:t.card,borderRadius:8,padding:"12px 14px",cursor:"grab",borderLeft:"3px solid "+borderColor,boxShadow: si.status==="late" ? "0 0 0 1px #FF475733, 0 1px 3px rgba(0,0,0,0.06)" : "0 1px 3px rgba(0,0,0,0.06)",transition:"all .15s",display:"flex",flexDirection:"column",gap:8 }}

  const hF = e => { Array.from(e.target.files).forEach(file => { const r=new FileReader(); r.onload=()=>sF(p=>({...p,attachments:[...(p.attachments||[]),{name:file.name,size:file.size,type:file.type,data:r.result}]})); r.readAsDataURL(file); }); e.target.value=""; };

  const fS = b => b<1024?b+" B":b<1048576?(b/1024).toFixed(1)+" KB":(b/1048576).toFixed(1)+" MB";
  const addC = () => { if(!nc.name.trim())return; const c={id:nc.name.toLowerCase().replace(/\s+/g,"_"),name:nc.name.trim(),color:nc.color}; onNC(c); set("client",c.id); setSnc(false); };

  const iS = { padding:"10px 12px",borderRadius:8,border:"1px solid "+t.brd,background:t.inp,color:t.text,fontSize:13,outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box" };
  const bS = { padding:"8px 18px",borderRadius:8,border:"none",fontSize:13,cursor:"pointer",fontFamily:"inherit" };

  return (

      <div style={{ background:t.card,borderRadius:16,padding:24,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 48px rgba(0,0,0,0.2)" }}>

          <div><label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Descrição</label>
            <textarea value={f.description||""} onChange={e=>set("description",e.target.value)} placeholder="Descreva a tarefa, o problema ou a solicitação..." rows={3} style={{...iS,resize:"vertical",minHeight:60}}/></div>
          <div>
            <label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Cliente</label>
            <div style={{ display:"flex",gap:8 }}>
              <select value={f.client} onChange={e=>set("client",e.target.value)} style={{...iS,flex:1}}>{cls.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
              <button onClick={()=>setSnc(!snc)} style={{...bS,background:t.colBg,color:t.mut,fontSize:18,padding:"6px 12px",border:"1px solid "+t.brd}} title="Novo cliente">+</button>
            </div>
            {snc && <div style={{ marginTop:8,padding:12,background:t.colBg,borderRadius:8,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap" }}>
              <input value={nc.name} onChange={e=>setNc(p=>({...p,name:e.target.value}))} placeholder="Nome do cliente" style={{...iS,flex:"1 1 120px"}}/>
              <input type="color" value={nc.color} onChange={e=>setNc(p=>({...p,color:e.target.value}))} style={{ width:36,height:36,borderRadius:8,border:"none",cursor:"pointer",padding:0 }}/>
              <button onClick={addC} style={{...bS,background:"#0984E3",color:"#fff",fontWeight:700}}>Adicionar</button>
            </div>}
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
            <div><label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Prioridade</label>
              <select value={f.priority} onChange={e=>set("priority",e.target.value)} style={iS}>{PRIORITIES.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
            <div><label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Solicitante</label>
              <select value={f.requester||""} onChange={e=>set("requester",e.target.value)} style={iS}><option value="">Selecione...</option>{mbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
            <div><label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Responsável</label>
              <select value={f.assignee} onChange={e=>set("assignee",e.target.value)} style={iS}>{mbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
            <div><label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Data de Criação</label>
              <input type="date" value={f.created||""} onChange={e=>set("created",e.target.value)} style={iS}/></div>
          </div>
          <div>
            <label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Tipo de Tarefa</label>
            <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
              {taskTypes.map(tt => (
                <button key={tt.id} onClick={()=>set("taskType", f.taskType===tt.id ? "" : tt.id)}
                  style={{ padding:"7px 14px",borderRadius:8,border:"2px solid "+(f.taskType===tt.id?"#0984E3":t.brd),background:f.taskType===tt.id?"#0984E322":t.inp,color:f.taskType===tt.id?"#0984E3":t.text,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5,transition:"all .15s" }}>
                  <span style={{fontSize:15}}>{tt.icon}</span> {tt.name}
                </button>
              ))}
            </div>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
            <div><label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Status</label>
              <select value={f.column} onChange={e=>set("column",e.target.value)} style={iS}>{COLUMNS.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
            <div><label style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,display:"block" }}>Prazo (SLA)</label>
              <div style={{ display:"flex",gap:6,alignItems:"center" }}>
                <input type="date" value={f.deadline||""} onChange={e=>sF(p=>({...p,deadline:e.target.value}))} style={{...iS,flex:1}}/>
              </div>
              {f.created && f.deadline && <div style={{ marginTop:4 }}><SlaTag task={f} sla={sla}/></div>}
            </div>
          </div>
          <div>
            <input ref={fr} type="file" multiple onChange={hF} style={{ display:"none" }}/>
            <button onClick={()=>fr.current?.click()} style={{...bS,background:t.colBg,color:t.mut,fontSize:12,border:"1px dashed "+t.brd,width:"100%",padding:10,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>📎 Anexar arquivo</button>
            {f.attachments?.length>0 && <div style={{ marginTop:8,display:"flex",flexDirection:"column",gap:4 }}>
              {f.attachments.map((a,i)=><div key={i} style={{ display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:t.colBg,borderRadius:6,fontSize:12 }}>
                <span style={{ color:t.mut }}>{a.type?.startsWith("image/")?"🖼":a.type?.includes("pdf")?"📄":"📁"}</span>
                <span style={{ flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:t.text }}>{a.name}</span>
                <span style={{ color:t.mut,fontSize:10,flexShrink:0 }}>{fS(a.size)}</span>
                <button onClick={()=>rmA(i)} style={{ background:"none",border:"none",color:"#FF7675",cursor:"pointer",fontSize:14,padding:0 }}>×</button>
              </div>)}
            </div>}
          </div>
        </div>
        <div style={{ display:"flex",gap:10,marginTop:20,justifyContent:"flex-end",flexWrap:"wrap" }}>
          {task.id && <button onClick={()=>{onDel(task.id);onClose();}} style={{...bS,background:"#FF767533",color:"#D63031"}}>Excluir</button>}
          <button onClick={onClose} style={{...bS,background:t.colBg,color:t.mut}}>Cancelar</button>
          <button onClick={()=>{onSave(f);onClose();}} style={{...bS,background:"#0984E3",color:"#fff",fontWeight:700}}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

function Flt({ filters, setF, cls, mbs, t, tasks, sla }) {
  const s = { padding:"6px 10px",borderRadius:8,border:"1px solid "+t.brd,background:t.inp,color:t.text,fontSize:12,outline:"none",fontFamily:"inherit",minWidth:0,flex:"1 1 100px" };
  const usedCls = cls.filter(c => tasks.some(tk => tk.client === c.id));
  const usedPri = PRIORITIES.filter(p => tasks.some(tk => tk.priority === p.id));
  const usedMbs = mbs.filter(m => tasks.some(tk => tk.assignee === m.id));
  const toggleCol = id => setF(p => {
    const cur = p.cols || COLUMNS.map(c=>c.id);
    return {...p, cols: cur.includes(id) ? cur.filter(x=>x!==id) : [...cur,id]};
  });
  const activeCols = filters.cols || COLUMNS.map(c=>c.id);
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
      <div style={{ display:"flex",gap:8,flexWrap:"wrap",alignItems:"center" }}>
        <span style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap" }}>Filtros:</span>
        <select value={filters.client} onChange={e=>setF(p=>({...p,client:e.target.value}))} style={s}><option value="">Todos clientes</option>{usedCls.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
        <select value={filters.priority} onChange={e=>setF(p=>({...p,priority:e.target.value}))} style={s}><option value="">Todas prioridades</option>{usedPri.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
        <select value={filters.assignee} onChange={e=>setF(p=>({...p,assignee:e.target.value}))} style={s}><option value="">Todos responsáveis</option>{usedMbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select>
        <select value={filters.sla||""} onChange={e=>setF(p=>({...p,sla:e.target.value}))} style={{...s, flex:"1 1 110px"}}><option value="">SLA: Todos</option><option value="ok">🟢 No prazo</option><option value="soon">🟡 Vence em breve</option><option value="late">🔴 Atrasadas</option></select>
        <input value={filters.search} onChange={e=>setF(p=>({...p,search:e.target.value}))} placeholder="Buscar..." style={{...s,flex:"1 1 140px"}}/>
      </div>
      <div style={{ display:"flex",gap:10,flexWrap:"wrap",alignItems:"center" }}>
        <span style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap" }}>Status:</span>
        {COLUMNS.map(col => {
          const active = activeCols.includes(col.id);
          const count = tasks.filter(tk=>tk.column===col.id).length;
          return (
            <label key={col.id} onClick={()=>toggleCol(col.id)} style={{ display:"flex",alignItems:"center",gap:5,cursor:"pointer",padding:"4px 10px",borderRadius:6,background:active?col.accent+"22":"transparent",border:"1px solid "+(active?col.accent+"55":t.brd),transition:"all .15s",userSelect:"none" }}>
              <span style={{ width:14,height:14,borderRadius:3,border:"2px solid "+(active?col.accent:t.mut),background:active?col.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",transition:"all .15s" }}>{active?"✓":""}</span>
              <span style={{ fontSize:11,fontWeight:600,color:active?col.accent:t.mut }}>{col.icon} {col.name}</span>
              <span style={{ fontSize:10,color:t.mut }}>({count})</span>
            </label>
          );
        })}
      </div>
    </div>
  );
}


function SettingsModal({ onClose, cls, setCls, mbs, setMbs, taskTypes, setTaskTypes, t }) {
  const [tab, setTab] = useState("clients");
  const PCOLORS = ["#6C5CE7","#00B894","#E17055","#D63031","#0984E3","#FDCB6E","#00CEC9","#A29BFE","#E84393","#FF9800","#0097A7","#8E44AD","#27AE60","#E74C3C","#3498DB"];

  // Clients state
  const [editCl, setEditCl] = useState(null);
  const [newCl, setNewCl] = useState({ name:"", color: PCOLORS[0] });

  // Members state
  const [editMb, setEditMb] = useState(null);
  const [newMb, setNewMb] = useState({ name:"", initials:"", color: PCOLORS[1] });

  // Task types state
  const [editTt, setEditTt] = useState(null);
  const [newTt, setNewTt] = useState({ name:"", icon:"📋" });

  const iS = { padding:"8px 10px", borderRadius:6, border:"1px solid "+t.brd, background:t.inp, color:t.text, fontSize:12, outline:"none", fontFamily:"inherit", width:"100%", boxSizing:"border-box" };
  const bS = (bg, cl) => ({ padding:"6px 14px", borderRadius:6, border:"none", fontSize:12, cursor:"pointer", fontFamily:"inherit", background:bg, color:cl, fontWeight:700 });

  const tabs = [
    { id:"clients", label:"🏢 Clientes" },
    { id:"members", label:"👤 Equipe" },
    { id:"tasktypes", label:"📋 Tipos de Tarefa" },
  ];

  // ---- CLIENTS ----
  const saveCl = (item) => {
    if (!item.name.trim()) return;
    const id = item.id || item.name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
    if (item.id) {
      setCls(p => p.map(x => x.id === item.id ? { ...item } : x));
    } else {
      setCls(p => [...p, { id, name: item.name.trim(), color: item.color }]);
    }
    setEditCl(null);
    setNewCl({ name:"", color: PCOLORS[Math.floor(Math.random()*PCOLORS.length)] });
  };
  const delCl = (id) => { if (window.confirm("Excluir este cliente?")) setCls(p => p.filter(x => x.id !== id)); };

  // ---- MEMBERS ----
  const saveMb = (item) => {
    if (!item.name.trim()) return;
    const id = item.id || item.name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
    if (item.id) {
      setMbs(p => p.map(x => x.id === item.id ? { ...item } : x));
    } else {
      setMbs(p => [...p, { id, name: item.name.trim(), initials: item.initials.trim().toUpperCase().slice(0,2), color: item.color }]);

    setEditMb(null);

    if (!item.name.trim()) return;

    if (item.id) {
      setTaskTypes(p => p.map(x => x.id === item.id ? { ...item } : x));

      setTaskTypes(p => [...p, { id, name: item.name.trim(), icon: item.icon || "📋" }]);

    setNewTt({ name:"", icon:"📋" });
  };
  const delTt = (id) => { if (window.confirm("Excluir este tipo de tarefa?")) setTaskTypes(p => p.filter(x => x.id !== id)); };

          {tab === "tasktypes" && (
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:10 }}>
                Tipos de tarefa ({taskTypes.length})
              </div>
              {taskTypes.map(tt => (
                <Row key={tt.id}>
                  {editTt?.id === tt.id ? (
                    <>
                      <input value={editTt.icon} onChange={e=>setEditTt(p=>({...p,icon:e.target.value}))} style={{...iS,width:48,textAlign:"center",fontSize:18}} placeholder="🔧"/>
                      <input value={editTt.name} onChange={e=>setEditTt(p=>({...p,name:e.target.value}))} style={{...iS,flex:1}} placeholder="Nome do tipo"/>
                      <button onClick={()=>saveTt(editTt)} style={bS("#0984E3","#fff")}>✓</button>
                      <button onClick={()=>setEditTt(null)} style={bS(t.colBg,t.mut)}>✕</button>
                    </>
                  ) : (
                    <>
                      <span style={{fontSize:18,flexShrink:0}}>{tt.icon}</span>
                      <span style={{flex:1,fontSize:13,fontWeight:600,color:t.text}}>{tt.name}</span>
                      <button onClick={()=>setEditTt({...tt})} style={bS(t.colBg,t.mut)}>✏️</button>
                      <button onClick={()=>delTt(tt.id)} style={bS("#FF767522","#D63031")}>🗑</button>
                    </>
                  )}
                </Row>
              ))}
              <div style={{ marginTop:14, padding:"12px 10px", background:t.colBg, borderRadius:8, border:"1px dashed "+t.brd }}>
                <div style={{ fontSize:11, fontWeight:700, color:t.mut, marginBottom:8, textTransform:"uppercase", letterSpacing:"0.06em" }}>+ Novo tipo</div>
                <div style={{ display:"flex", gap:8 }}>
                  <input value={newTt.icon} onChange={e=>setNewTt(p=>({...p,icon:e.target.value}))} style={{...iS,width:52,textAlign:"center",fontSize:18}} placeholder="🔧"/>
                  <input value={newTt.name} onChange={e=>setNewTt(p=>({...p,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&saveTt(newTt)} style={{...iS,flex:1}} placeholder="Nome do tipo de tarefa"/>
                  <button onClick={()=>saveTt(newTt)} style={bS("#0984E3","#fff")}>Adicionar</button>
                </div>
              </div>
            </div>
          )}

        </div>

        {/* Footer */}
        <div style={{ padding:"12px 24px", borderTop:"1px solid "+t.brd, display:"flex", justifyContent:"flex-end", flexShrink:0 }}>
          <button onClick={onClose} style={bS("#0984E3","#fff")}>Fechar</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tasks, setTasks] = useState([]);
  const [cls, setCls] = useState(DEFAULT_CLIENTS);
  const [mbs, setMbs] = useState(DEFAULT_MEMBERS);
  const [taskTypes, setTaskTypes] = useState(TASK_TYPES);
  const [showSettings, setShowSettings] = useState(false);
  const [sla, setSla] = useState(DEFAULT_SLA);
  const [loaded, setLoaded] = useState(false);
  const [mdl, setMdl] = useState(null);
  const [showSla, setShowSla] = useState(false);
  const [flt, setFlt] = useState({ client:"",priority:"",assignee:"",search:"",sla:"",cols:COLUMNS.map(c=>c.id) });
  const [view, setView] = useState("kanban");
  const [theme, setTheme] = useState("dark");
  const t = TH[theme];

  useEffect(() => { Promise.all([sLoad("geo-tasks"),sLoad("geo-clients"),sLoad("geo-theme"),sLoad("geo-sla"),sLoad("geo-members"),sLoad("geo-tasktypes")]).then(([tk,cl,th,sl,mb,tt])=>{
    setTasks(tk||SAMPLE);
    if(cl) {
      const defIds = DEFAULT_CLIENTS.map(c=>c.id);
      const custom = cl.filter(c=>!defIds.includes(c.id));
      setCls([...DEFAULT_CLIENTS, ...custom]);
    }
    if(mb) setMbs(mb);
    if(tt) setTaskTypes(tt);
    if(th)setTheme(th); if(sl)setSla(sl); setLoaded(true);
  }); }, []);
  useEffect(() => { if(loaded) sSave("geo-tasks",tasks); }, [tasks,loaded]);
  useEffect(() => { if(loaded) sSave("geo-clients",cls); }, [cls,loaded]);
  useEffect(() => { if(loaded) sSave("geo-theme",theme); }, [theme,loaded]);
  useEffect(() => { if(loaded) sSave("geo-members",mbs); }, [mbs,loaded]);
  useEffect(() => { if(loaded) sSave("geo-tasktypes",taskTypes); }, [taskTypes,loaded]);
  useEffect(() => { if(loaded) sSave("geo-sla",sla); }, [sla,loaded]);

  const today = () => new Date().toISOString().slice(0,10);
  const hSave = f => { if(f.id) setTasks(p=>p.map(x=>x.id===f.id?f:x)); else setTasks(p=>[...p,{...f,id:uuid(),created:f.created||today()}]); };
  const hDrop = (tid,col) => setTasks(p=>p.map(x=>x.id===tid?{...x,column:col}:x));
  const hDel = id => setTasks(p=>p.filter(x=>x.id!==id));

  const activeCols = flt.cols || COLUMNS.map(c=>c.id);
  const filtered = tasks.filter(x => {
    if(!activeCols.includes(x.column)) return false;
    if(flt.client && x.client!==flt.client) return false;
    if(flt.priority && x.priority!==flt.priority) return false;
    if(flt.assignee && x.assignee!==flt.assignee) return false;
    if(flt.search && !x.title.toLowerCase().includes(flt.search.toLowerCase())) return false;
    if(flt.sla) {
      const si = getSlaInfo(x, sla);
      if(flt.sla==="late" && si.status!=="late") return false;
      if(flt.sla==="soon" && si.status!=="today" && si.status!=="soon") return false;
      if(flt.sla==="ok" && si.status!=="ok") return false;
    }
    return true;
  });

  const lateCount = tasks.filter(x => getSlaInfo(x, sla).status === "late").length;

  const nT = () => { const td = today(); setMdl({ title:"",column:"pendente",client:"geral",priority:"media",assignee:"fabio",requester:"",description:"",created:td,deadline:calcDeadline(td,"media",sla),attachments:[] }); };
  const bS = { padding:"8px 18px",borderRadius:8,border:"none",fontSize:13,cursor:"pointer",fontFamily:"inherit" };
  const iSla = { padding:"6px 10px",borderRadius:8,border:"1px solid "+t.brd,background:t.inp,color:t.text,fontSize:13,outline:"none",fontFamily:"inherit",width:60,textAlign:"center" };

  return (
    <div style={{ fontFamily:"'DM Sans','Segoe UI',sans-serif",background:t.bg,minHeight:"100vh",color:t.text }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      <div style={{ padding:"12px 16px",borderBottom:"1px solid "+t.brd,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap" }}>
        <img src={LOGO_LIGHT} alt="GlobalCad" style={{ height:36, objectFit:"contain" }}/>
        <div style={{ fontSize:10,color:t.mut,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",borderLeft:"1px solid "+t.brd,paddingLeft:12 }}>Gestão de Tarefas</div>
        {lateCount > 0 && <span style={{ background:"#FF475722",color:"#FF4757",fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:20,cursor:"pointer" }} onClick={()=>setFlt(p=>({...p,sla:"late"}))}>🔴 {lateCount} atrasada{lateCount>1?"s":""}</span>}
        <div style={{ marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap" }}>
          <button onClick={()=>setShowSla(!showSla)} style={{...bS,padding:"6px 12px",background:t.colBg,color:t.mut,fontSize:11,fontWeight:700,border:"1px solid "+t.brd}} title="Configurar SLA">⏱ SLA</button>
          <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{...bS,padding:"6px 12px",background:t.colBg,color:t.mut,fontSize:16}} title="Alternar tema">{theme==="dark"?"☀":"🌙"}</button>
          <button onClick={()=>setShowSettings(true)} style={{...bS,padding:"6px 12px",background:t.colBg,color:t.mut,fontSize:14}} title="Configurações">⚙️</button>
          {["kanban","table"].map(v=><button key={v} onClick={()=>setView(v)} style={{...bS,padding:"6px 14px",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",background:view===v?"#0984E3":t.colBg,color:view===v?"#fff":t.mut}}>{v==="kanban"?"⊞ Quadro":"☰ Grade"}</button>)}
          <button onClick={nT} style={{...bS,padding:"8px 16px",background:"#0984E3",color:"#fff",fontWeight:700,fontSize:12}}>+ Nova Tarefa</button>
        </div>
      </div>
      {showSla && (
        <div style={{ padding:"12px 16px",borderBottom:"1px solid "+t.brd,background:t.colBg }}>
          <div style={{ display:"flex",gap:16,alignItems:"center",flexWrap:"wrap" }}>
            <span style={{ fontSize:11,fontWeight:700,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em" }}>SLA (dias):</span>
            {PRIORITIES.map(p=>(
              <div key={p.id} style={{ display:"flex",alignItems:"center",gap:6 }}>
                <span style={{ fontSize:12,color:p.color,fontWeight:600 }}>{p.icon} {p.name}</span>
                <input type="number" min={1} value={sla[p.id]||""} onChange={e=>setSla(s=>({...s,[p.id]:parseInt(e.target.value)||0}))} style={iSla}/>
                <span style={{ fontSize:10,color:t.mut }}>dias</span>
              </div>
            ))}
            <button onClick={()=>setShowSla(false)} style={{...bS,padding:"4px 12px",background:t.card,color:t.mut,fontSize:11}}>Fechar</button>
          </div>
        </div>
      )}
      <div style={{ padding:"10px 16px" }}><Flt filters={flt} setF={setFlt} cls={cls} mbs={mbs} t={t} tasks={tasks} sla={sla}/></div>
      {view==="kanban" ? (
        <div style={{ padding:"0 16px 60px",display:"flex",gap:10,overflowX:"auto" }}>
          {COLUMNS.filter(col=>activeCols.includes(col.id)).map(col=><Col key={col.id} col={col} tasks={filtered.filter(x=>x.column===col.id)} onEdit={setMdl} onDrop={hDrop} cls={cls} mbs={mbs} t={t} sla={sla}/>)}
        </div>
      ) : (
        <div style={{ padding:"0 16px 60px",overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
            <thead><tr style={{ borderBottom:"2px solid "+t.brd }}>{["Tarefa","Cliente","Status","Prioridade","Prazo","SLA","Responsável"].map(h=><th key={h} style={{ padding:"10px 12px",textAlign:"left",fontWeight:800,fontSize:11,color:t.mut,textTransform:"uppercase",letterSpacing:"0.06em" }}>{h}</th>)}</tr></thead>
            <tbody>{filtered.map(tk=>{const col=COLUMNS.find(c=>c.id===tk.column); const dl=tk.deadline||calcDeadline(tk.created,tk.priority,sla); return(
              <tr key={tk.id} onClick={()=>setMdl(tk)} style={{ borderBottom:"1px solid "+t.brd,cursor:"pointer" }} onMouseEnter={e=>e.currentTarget.style.background=t.colBg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <td style={{ padding:"10px 12px",fontWeight:600 }}><div style={{display:"flex",alignItems:"center",gap:6}}>{tk.title}{tk.attachments?.length>0 && <span style={{fontSize:11,color:t.mut}} title={tk.attachments.length+" anexo(s)"}>📎</span>}</div></td>
                <td style={{ padding:"10px 12px",fontSize:11,color:t.mut }}>{TASK_TYPES.find(x=>x.id===tk.taskType)?.icon} {TASK_TYPES.find(x=>x.id===tk.taskType)?.name}</td>
                <td style={{ padding:"10px 12px" }}><Bg c={tk.client} cls={cls}/></td>
                <td style={{ padding:"10px 12px" }}><span style={{ color:col?.accent,fontSize:12,fontWeight:600 }}>{col?.icon} {col?.name}</span></td>
                <td style={{ padding:"10px 12px" }}><Pd pid={tk.priority}/> {PRIORITIES.find(p=>p.id===tk.priority)?.name}</td>
                <td style={{ padding:"10px 12px",fontFamily:"monospace",fontSize:11,color:t.mut }}>{dl}</td>
                <td style={{ padding:"10px 12px" }}><SlaTag task={tk} sla={sla}/></td>
                <td style={{ padding:"10px 12px" }}><Av m={tk.assignee} mbs={mbs} sz={22}/></td>
              </tr>);})}</tbody>
          </table>
        </div>
      )}
      <div style={{ position:"fixed",bottom:0,left:0,right:0,background:t.card,borderTop:"1px solid "+t.brd,padding:"8px 16px",display:"flex",gap:16,fontSize:11,color:t.mut,fontWeight:600,flexWrap:"wrap",zIndex:10 }}>
        {COLUMNS.map(col=><span key={col.id} style={{ color:col.accent }}>{col.icon} {col.name}: {tasks.filter(x=>x.column===col.id).length}</span>)}
        <span style={{ marginLeft:"auto" }}>Total: {tasks.length}</span>
      </div>
      {mdl && <Mdl task={mdl} onSave={hSave} onDel={hDel} onClose={()=>setMdl(null)} cls={cls} mbs={mbs} t={t} onNC={c=>setCls(p=>[...p,c])} sla={sla} taskTypes={taskTypes}/>}
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} cls={cls} setCls={setCls} mbs={mbs} setMbs={setMbs} taskTypes={taskTypes} setTaskTypes={setTaskTypes} t={t}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
